<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Sent</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      color: #fff;
      font-family: Poppins, sans-serif;
    }

    .box {
      text-align: center;
      padding: 40px;
      background: #111827;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      width: 90%;
      max-width: 420px;
    }

    .check {
      font-size: 60px;
      color: #22c55e;
      margin-bottom: 10px;
    }

    h1 {
      margin: 10px 0;
      font-size: 28px;
    }

    p {
      color: #cbd5e1;
      margin-bottom: 20px;
    }

    a {
      display: inline-block;
      padding: 10px 18px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.3s;
    }

    a:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>

  <div class="box">
    <div class="check">✔</div>
    <h1>Message Sent!</h1>
    <p>Thanks for reaching out 👍<br>I'll get back to you soon.</p>
    <a href="index.html">Go Back Home</a>
  </div>

</body>
</html>
