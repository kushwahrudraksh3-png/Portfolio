<body>
  <header class="navbar">
    <div class="container nav-wrap">
      <a class="logo" href="index.html">Portfolio.</a>

        <i class="fa-solid fa-bars"></i>

        <a href="projects.html">Projects</a>
        <a class="active" href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <h1 class="section-title reveal">Contact</h1>
      <p class="section-subtitle reveal">
        Have a project in mind? Let's connect and discuss how we can build
        something impactful together.
      </p>

      <div class="contact-grid">
        <section class="contact-info glass reveal">
          <h3 style="margin-bottom: 1rem">Contact Info</h3>
          <div class="contact-items">
            <p class="contact-item">
              <i class="fa-solid fa-phone"></i>
              <a href="#">+91 9343713134</a>
            </p>
            <p class="contact-item">
              <i class="fa-solid fa-envelope"></i>
              <a href="mailto:kushwarudraksh3@gmail.com">kushwarudraksh3@gmail.com</a>
            </p>
            <p class="contact-item">
              <i class="fa-brands fa-linkedin-in"></i>
              <a href="https://www.linkedin.com/in/rudraksh-kushwah-0601b33ba/" target="_blank"
                rel="noopener noreferrer">LinkedIn Profile</a>
            </p>
            <p class="contact-item">
              <i class="fa-brands fa-github"></i>
              <a href="https://github.com/kushwahrudraksh3-png">GitHub</a>
            </p>
            <p class="contact-item">
              <i class="fa-brands fa-instagram"></i>
              <a href="https://www.instagram.com/__rudraksh_001_/">Instagram</a>
            </p>
          </div>
        </section>

        <section class="contact-form glass reveal">
          <h3 style="margin-bottom: 1rem">Send Message</h3>
          <form name="contact" method="POST" data-netlify="true">

            <input type="hidden" name="form-name" value="contact" />

            <input type="text" name="name" placeholder="Your Name" required />

            <input type="email" name="email" placeholder="Your Email" required />

            <textarea name="message" placeholder="Your Message" required></textarea>

            <button type="submit" class="btn btn-primary">Send Message</button>

          </form>
        </section>
      </div>
    </div>
  </main>

  <footer class="footer">

      <div class="social-links">
